<svg xmlns="http://www.w3.org/2000/svg" width="1917" height="195" viewBox="0 0 1917 195" role="img" aria-labelledby="title desc">
  <title id="title">System architecture</title>
  <desc id="desc">Architecture diagram showing webcam and mmWave inputs flowing into local edge analytics, storage, API, and dashboard outputs.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5f5f5"/>
    </marker>
    <style>
      .bg { fill: #181818; }
      .node { fill: #242424; stroke: #d9d9d9; stroke-width: 2; rx: 0; ry: 0; }
      .label { fill: #f5f5f5; font-family: Arial, Helvetica, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
      .edge { fill: none; stroke: #f5f5f5; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1917" height="195"/>

  <rect class="node" x="2" y="14" width="252" height="54"/>
  <text class="label" x="128" y="41">USB Webcam / Video Input</text>

  <rect class="node" x="303" y="14" width="160" height="54"/>
  <text class="label" x="383" y="41">Capture + ROI</text>

  <rect class="node" x="528" y="14" width="228" height="54"/>
  <text class="label" x="642" y="41">ONNX Person Detection</text>

  <rect class="node" x="823" y="3" width="261" height="76"/>
  <text class="label" x="954" y="41">Tracking + Virtual Line Crossing</text>

  <rect class="node" x="1132" y="71" width="230" height="54"/>
  <text class="label" x="1247" y="98">Rolling Metrics + Events</text>

  <rect class="node" x="1425" y="20" width="167" height="54"/>
  <text class="label" x="1508.5" y="47">SQLite Storage</text>

  <rect class="node" x="1412" y="123" width="195" height="54"/>
  <text class="label" x="1509.5" y="150">FastAPI REST + SSE</text>

  <rect class="node" x="1655" y="111" width="261" height="78"/>
  <text class="label" x="1785.5" y="150">Dashboard / Calibration / Validation</text>

  <rect class="node" x="513" y="117" width="262" height="78"/>
  <text class="label" x="644" y="156">mmWave Sensor / Mock Stream</text>

  <rect class="node" x="862" y="130" width="183" height="54"/>
  <text class="label" x="953.5" y="157">Presence Sensing</text>

  <path class="edge" d="M 254 41 L 303 41"/>
  <path class="edge" d="M 463 41 L 528 41"/>
  <path class="edge" d="M 756 41 L 823 41"/>
  <path class="edge" d="M 1084 41 C 1120 41, 1140 52, 1180 71"/>

  <path class="edge" d="M 775 156 L 862 156"/>
  <path class="edge" d="M 1045 157 C 1085 157, 1110 146, 1178 125"/>

  <path class="edge" d="M 1362 98 C 1390 98, 1398 83, 1425 74"/>
  <path class="edge" d="M 1362 98 C 1385 98, 1394 119, 1412 149"/>
  <path class="edge" d="M 1607 150 L 1655 150"/>
</svg>
